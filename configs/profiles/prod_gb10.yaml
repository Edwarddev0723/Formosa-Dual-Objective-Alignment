model:
  name: Qwen/Qwen2.5-VL-7B-Instruct
  attn_implementation: flash_attention_2
  torch_dtype: bf16

data:
  num_workers: 8
  max_pixels: 802816

training:
  per_device_batch_size: 2
  gradient_accumulation_steps: 16
  gradient_checkpointing: true

device:
  force: cuda
  mixed_precision: bf16

logging:
  backend: wandb
  output_dir: outputs

smoke:
  enabled: false
