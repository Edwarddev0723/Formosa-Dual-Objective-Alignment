model:
  name: Qwen/Qwen2.5-VL-3B-Instruct
  attn_implementation: sdpa

data:
  train_manifest: data/synthetic/train_synth.jsonl
  val_manifest: data/synthetic/val_synth.jsonl
  vocab_path: data/synthetic/vocab_synth.json
  image_root: data/synthetic/images
  num_workers: 0
  max_pixels: 50176

training:
  per_device_batch_size: 1
  gradient_accumulation_steps: 1
  num_epochs: 1
  eval_steps: 2
  save_steps: 3
  logging_steps: 1

device:
  force: mps
  mixed_precision: "no"

smoke:
  enabled: true
  max_train_samples: 8
  max_eval_samples: 4
  max_steps: 3
  max_caption_tokens_override: 256
  max_pixels_override: 50176
